<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBridge — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <!-- Built by app.js → App.buildSidebar() -->
</aside>

<!-- Main -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar" id="topbar">
    <!-- Built by app.js → App.buildTopbar() -->
  </div>

  <!-- Page content -->
  <div style="padding: 28px 32px;" id="main-content">
    <!-- Pages injected by app.js → App.buildPages() -->
  </div>

</div>

<!-- Scripts — order matters -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/session.js"></script>
<script src="js/ui.js"></script>
<script src="js/pages.js"></script>
<script src="js/import.js"></script>
<script src="js/app.js"></script>

</body>
</html>
